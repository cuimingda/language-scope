<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Language Scope Simulator</title>
    <link rel="stylesheet" href="../styles/content.css" />
    <link rel="stylesheet" href="simulator.css" />
  </head>
  <body>
    <main class="simulator-page">
      <h1>Language Scope Highlight Simulator</h1>
      <p class="hint">This page renders sample sentences with the same highlighting rules.</p>
      <div class="controls">
        <button id="runHighlight">Run highlight</button>
        <button id="clearHighlight">Clear highlight</button>
        <button id="runtimeSelfCheck">Run runtime self-check</button>
      </div>
      <div id="runtimeSelfCheckOutput" class="check-output" aria-live="polite"></div>

      <section id="generated-rules" class="generated-rules"></section>
    </main>

    <script src="../scripts/highlight-engine.js"></script>
    <script src="../scripts/highlight-runtime.js"></script>
    <script src="../scripts/patterns.js"></script>
    <script src="simulator.js"></script>
  </body>
</html>
